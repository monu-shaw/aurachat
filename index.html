<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraChat - Local AI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#212529">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
</head>
<body>

<div class="chat-container">
    <nav class="navbar navbar-dark bg-dark px-4 shadow-sm">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#historySidebar">
                📜 History
            </button>
            <a class="navbar-brand fw-bold mb-0" href="#">✨ AuraChat</a>
        </div>
        
        <div class="d-flex align-items-center gap-3">
            
            <a href="guide.html" class="text-white text-decoration-none small border border-light p-1 rounded-1">📖 Guide</a>
            <span id="statusBadge" class="badge bg-warning text-dark">Waiting for Model...</span>
            <label for="modelFileInput" class="btn btn-outline-light btn-sm mb-0" id="uploadBtnLabel">
                <i class="bi bi-upload"></i> Model
            </label>
            <input type="file" id="modelFileInput" accept=".litertlm">
        </div>
    </nav>

    <div class="offcanvas offcanvas-start bg-dark text-light" tabindex="-1" id="historySidebar">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title fw-bold">Recent Chats (Max 20)</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-focus="false" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-2">
            <div class="d-grid gap-2 my-1">
                <button class="btn btn-outline-primary btn-block" onclick="startNewChat()">
                    <i class="bi bi-plus-circle"></i> New Chat
                </button>
            </div>
            <div class="list-group list-group-flush" id="sessionList">
                </div>
        </div>
    </div>

    <div class="chat-body" id="chatBox">
        <div class="message msg-system" id="initMessage">
            Welcome to AuraChat! Please add the gemma-4-E2B.litertlm file or select a past chat from History to begin.
        </div>
    </div>

    <div class="input-area pb-1">
        <div class="input-group">
            <textarea id="userInput" class="form-control" rows="1" placeholder="Type your message here..."></textarea>
            <button class="btn btn-primary px-4" id="sendBtn">
                <i class="bi bi-send"></i>
            </button>
        </div>
        <p class="mb-0" style="text-align:center; font-family:Arial, sans-serif; color:#555;">
            Made with ❤️ by 
            <a href="https://monu-shaw.github.io/portfolio/" target="_blank" rel="noopener noreferrer"
                style="color:inherit; font-weight:bold; text-decoration:none;">
                <strong> Monu</strong>
            </a>
            
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Explicitly set the scope to the current subdirectory
      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .then((registration) => {
          console.log('ServiceWorker secured for scope: ', registration.scope);
        })
        .catch((error) => {
          console.log('ServiceWorker registration failed: ', error);
        });
    });
  }
</script>
</body>
</html>
